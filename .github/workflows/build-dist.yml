name: Build Distribution Packages

on:
  push:
  workflow_dispatch:

jobs:
  artifact-policy:
    runs-on: ubuntu-latest
    outputs:
      save_artifacts: ${{ steps.decide.outputs.save_artifacts }}
    steps:
      - name: Decide artifact upload
        id: decide
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
        run: |
          save_artifacts=false
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$REF_NAME" = "refs/heads/main" ] || [[ "$HEAD_COMMIT_MESSAGE" == *"[save artifacts]"* ]]; then
            save_artifacts=true
          fi
          echo "save_artifacts=$save_artifacts" >> "$GITHUB_OUTPUT"
  build:
    needs: artifact-policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        working-directory: dotnet/ComponentClassRegistry
        run: dotnet restore
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Build packages
        run: |
          ./gradlew clean build verifyDistributionPackages ccrCliPackages verifyCcrCliPackages
      - name: Artifacts SHA256
        shell: bash
        run: |
          sha256sum build/distributions/*.{deb,rpm,zip} 2> /dev/null
          ls -go --full-time build/distributions/*.{deb,rpm,zip} 2> /dev/null
          sha256sum build/distributions/ccr/*.{deb,rpm,zip} 2> /dev/null
          ls -go --full-time build/distributions/ccr/*.{deb,rpm,zip} 2> /dev/null
      - name: Artifacts
        if: needs.artifact-policy.outputs.save_artifacts == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: dists
          retention-days: 1
          if-no-files-found: error
          path: |
            build/distributions/*.deb
            build/distributions/*.rpm
            build/distributions/*.zip
            build/distributions/ccr/*.deb
            build/distributions/ccr/*.rpm
            build/distributions/ccr/*.zip
