name: .NET build paccor_scripts

on:
  push:
  workflow_dispatch:

jobs:
  artifact-policy:
    runs-on: ubuntu-latest
    outputs:
      save_artifacts: ${{ steps.decide.outputs.save_artifacts }}
    steps:
      - name: Decide artifact upload
        id: decide
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
        run: |
          save_artifacts=false
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$REF_NAME" = "refs/heads/main" ] || [[ "$HEAD_COMMIT_MESSAGE" == *"[save artifacts]"* ]]; then
            save_artifacts=true
          fi
          echo "save_artifacts=$save_artifacts" >> "$GITHUB_OUTPUT"
  build:
    needs: artifact-policy
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Remove problem matcher for now
      run: |
        echo "::remove-matcher owner=csc::"
        echo "::remove-matcher owner=dotnet::"
    - name: Restore dependencies
      working-directory: dotnet/paccor_scripts
      run: dotnet restore
    - name: Build
      working-directory: dotnet/paccor_scripts
      run: dotnet build -c Release
    - name: Test
      working-directory: dotnet/paccor_scripts
      run: dotnet test
    - name: Pack
      working-directory: dotnet/paccor_scripts
      run: dotnet pack
    - name: Publish
      working-directory: dotnet/paccor_scripts/paccor_scripts
      run: |
        dotnet publish -r linux-x64 -c Release
        dotnet publish -r win-x64 -c Release
    - name: Nuget SHA256
      shell: bash
      run: |
        sha256sum dotnet/paccor_scripts/paccor_scripts/bin/Release/*nupkg
        ls -go --full-time dotnet/paccor_scripts/paccor_scripts/bin/Release/*nupkg
    - name: Nuget Packages
      if: needs.artifact-policy.outputs.save_artifacts == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: nuget.rc.builton_${{ matrix.os }}
        retention-days: 1
        if-no-files-found: error
        path: |
          dotnet/paccor_scripts/paccor_scripts/bin/Release/*nupkg
