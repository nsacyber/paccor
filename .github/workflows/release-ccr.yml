name: Release ComponentClassRegistry CLI Assets

on:
  workflow_dispatch:
    inputs:
      ccr_cli_tool:
        description: CCR CLI tool to release
        required: true
        type: choice
        default: ALL
        options:
          - SmbiosCli
          - PcieCli
          - StorageCli
          - ALL

jobs:
  upload-ccr-assets:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    env:
      CCR_DIST_DIR: build/distributions/ccr

    steps:
      - name: Install packages into runner
        run: |
          sudo apt-get update
          sudo apt-get install -y debsigs rpm
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Resolve CCR CLI Selection
        id: ccr_selection
        env:
          CCR_CLI_TOOL: ${{ inputs.ccr_cli_tool }}
        run: |
          case "$CCR_CLI_TOOL" in
            SmbiosCli|PcieCli|StorageCli)
              echo "gradle_tasks=ccrCliLinuxZip${CCR_CLI_TOOL} ccrCliWinZip${CCR_CLI_TOOL} ccrCliDeb${CCR_CLI_TOOL} ccrCliRpm${CCR_CLI_TOOL}" >> "$GITHUB_OUTPUT"
              ;;
            ALL)
              echo "gradle_tasks=ccrCliPackages verifyCcrCliPackages" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unknown CCR CLI tool selection: $CCR_CLI_TOOL" >&2
              exit 1
              ;;
          esac
      - name: Build CCR packages
        run: ./gradlew clean ${{ steps.ccr_selection.outputs.gradle_tasks }}
      - name: Resolve GitHub Release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          RELEASE_REF: ${{ github.ref_name }}
        run: |
          RELEASE_JSON=$(gh release view "$RELEASE_REF" --repo "$REPO_NAME" --json databaseId,tagName)
          RELEASE_ID=$(jq -r '.databaseId // empty' <<< "$RELEASE_JSON")
          RELEASE_TAG=$(jq -r '.tagName // empty' <<< "$RELEASE_JSON")

          if [ -z "$RELEASE_ID" ] || [ -z "$RELEASE_TAG" ]; then
            echo "The selected workflow ref '$RELEASE_REF' must resolve to a GitHub release with both a release id and tag." >&2
            exit 1
          fi

          echo "id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
      - name: Import GPG Key Natively
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
      - name: Save GPG Passphrase to File
        run: |
          echo "${{ secrets.GPG_PASSPHRASE }}" > /dev/shm/gpg_pass.txt
          chmod 600 /dev/shm/gpg_pass.txt
      - name: Sign RPM and DEB
        run: |
          KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec:' | cut -d: -f5)
          
          echo "%_gpg_name $KEY_ID" >> ~/.rpmmacros
          echo "%_gpg_digest_algo sha256" >> ~/.rpmmacros

          export GPG_TTY=/dev/null
          rpm --define "_gpg_sign_cmd_extra_args --pinentry-mode loopback --passphrase-file /dev/shm/gpg_pass.txt" --addsign "$CCR_DIST_DIR"/*.rpm

          for deb in "$CCR_DIST_DIR"/*.deb; do
            [ -e "$deb" ] || continue
            echo "Signing DEB: $deb"
            DEBSIGS_GPG_PROGRAM="gpg --batch --pinentry-mode loopback --passphrase-file /dev/shm/gpg_pass.txt" \
            debsigs --sign=origin --default-key="$KEY_ID" "$deb"
          done
      - name: Erase GPG File
        if: always()
        run: |
          # Always erase the file
          shred -u /dev/shm/gpg_pass.txt
      - name: Generate Markdown Table with Bash
        id: generate_table
        run: |
          TABLE="| Filename | SHA-256 hash | File Size in Bytes |\n| :--- | :--- | :--- |\n"
          
          for FILE in "$CCR_DIST_DIR"/*.{deb,rpm,zip}; do
            if [ -f "$FILE" ]; then
              SIZE=$(stat -c%s "$FILE")
              HASH=$(sha256sum "$FILE" | awk '{print $1}')
              TABLE="${TABLE}| \`${FILE}\` | ${HASH} | \`${SIZE}\` |\n"
            fi
          done
          
          # Markdown
          echo "HASH_TABLE<<EOF" >> $GITHUB_OUTPUT
          echo -e "$TABLE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Append Table to Release Description
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HASH_TABLE: ${{ steps.generate_table.outputs.HASH_TABLE }}
          RELEASE_ID: ${{ steps.release.outputs.id }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          REPO_NAME: ${{ github.repository }}
        run: |
          EXISTING_BODY=$(gh api repos/$REPO_NAME/releases/$RELEASE_ID --jq '.body // ""')
          
          # printf can handle newlines and special markdown characters
          printf -v UPDATED_BODY "%s\n\n%s" "$EXISTING_BODY" "$HASH_TABLE"
          
          gh api \
          --silent \
          --method PATCH \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          repos/$REPO_NAME/releases/$RELEASE_ID \
          -f body="$UPDATED_BODY"

      - name: Upload Finished Assets to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: |
            "$CCR_DIST_DIR"/*.{deb,rpm,zip}
