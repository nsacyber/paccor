name: Release ComponentClassRegistry CLI Assets

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Tag or ref to check out and package
        required: true
        type: string

jobs:
  upload-ccr-assets:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    env:
      CCR_DIST_DIR: build/distributions/ccr

    steps:
      - name: Install packages into runner
        run: |
          sudo apt-get update
          sudo apt-get install -y debsigs rpm
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_ref }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Build CCR packages
        run: ./gradlew clean ccrCliPackages verifyCcrCliPackages
      - name: Resolve GitHub Release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          RELEASE_REF: ${{ inputs.release_ref }}
        run: |
          RELEASE_JSON=$(gh release view "$RELEASE_REF" --repo "$REPO_NAME" --json databaseId,tagName)
          echo "id=$(jq -r '.databaseId' <<< "$RELEASE_JSON")" >> "$GITHUB_OUTPUT"
          echo "tag=$(jq -r '.tagName' <<< "$RELEASE_JSON")" >> "$GITHUB_OUTPUT"
      - name: Import GPG Key Natively
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
      - name: Save GPG Passphrase to File
        run: |
          echo "${{ secrets.GPG_PASSPHRASE }}" > /dev/shm/gpg_pass.txt
          chmod 600 /dev/shm/gpg_pass.txt
      - name: Sign RPM and DEB
        run: |
          KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec:' | cut -d: -f5)
          gpg --armor --export "$KEY_ID" > "$CCR_DIST_DIR/paccor-ccr-public-key.asc"

          echo "%_gpg_name $KEY_ID" >> ~/.rpmmacros
          echo "%_gpg_digest_algo sha256" >> ~/.rpmmacros

          export GPG_TTY=/dev/null
          rpm --define "_gpg_sign_cmd_extra_args --pinentry-mode loopback --passphrase-file /dev/shm/gpg_pass.txt" --addsign "$CCR_DIST_DIR"/*.rpm

          for deb in "$CCR_DIST_DIR"/*.deb; do
            [ -e "$deb" ] || continue
            echo "Signing DEB: $deb"
            DEBSIGS_GPG_PROGRAM="gpg --batch --pinentry-mode loopback --passphrase-file /dev/shm/gpg_pass.txt" \
            debsigs --sign=origin --default-key="$KEY_ID" "$deb"
          done
      - name: Erase GPG File
        if: always()
        run: |
          if [ -f /dev/shm/gpg_pass.txt ]; then
            shred -u /dev/shm/gpg_pass.txt
          fi
      - name: Generate CCR SHA256 metadata
        id: generate_table
        run: |
          sha256sum "$CCR_DIST_DIR"/*.{asc,deb,rpm,zip} > "$CCR_DIST_DIR/paccor-ccr-sha256.txt"

          TABLE="### ComponentClassRegistry CLI packages\n\n| Filename | SHA-256 hash | File Size in Bytes |\n| :--- | :--- | :--- |\n"
          for FILE in "$CCR_DIST_DIR"/*.{asc,deb,rpm,zip}; do
            if [ -f "$FILE" ]; then
              SIZE=$(stat -c%s "$FILE")
              HASH=$(sha256sum "$FILE" | awk '{print $1}')
              TABLE="${TABLE}| \`$(basename "$FILE")\` | ${HASH} | \`${SIZE}\` |\n"
            fi
          done

          echo "HASH_TABLE<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$TABLE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Append CCR table to Release Description
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HASH_TABLE: ${{ steps.generate_table.outputs.HASH_TABLE }}
          RELEASE_ID: ${{ steps.release.outputs.id }}
          REPO_NAME: ${{ github.repository }}
        run: |
          EXISTING_BODY=$(gh api repos/$REPO_NAME/releases/$RELEASE_ID --jq '.body // ""')
          printf -v UPDATED_BODY "%s\n\n%s" "$EXISTING_BODY" "$HASH_TABLE"

          gh api \
            --silent \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            repos/$REPO_NAME/releases/$RELEASE_ID \
            -f body="$UPDATED_BODY"
      - name: Upload Finished CCR Assets to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: |
            build/distributions/ccr/*.asc
            build/distributions/ccr/*.deb
            build/distributions/ccr/*.rpm
            build/distributions/ccr/*.zip
            build/distributions/ccr/*sha256.txt