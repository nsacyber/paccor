name: Integration Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

jobs:
  remote-and-cli:
    name: Remote signer and CLI integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Run signing paths CLI tests
        run: ./gradlew --no-daemon test --tests "*AssembleCmdSigningPathsTest*"

  pkcs11-softHSM:
    name: PKCS#11 (SoftHSM2) integration
    runs-on: ubuntu-latest
    env:
      SOFTHSM2_CONF: /tmp/softhsm2.conf
      PKCS11_PIN: 1234
      # Embedded test certificate and key (base64 encoded)
      # From paccor/src/test/resources/TestCA.cert.example.pem and paccor/src/test/resources/TestCA.private.example.pem
      TEST_CERT_B64: 
      TEST_KEY_B64: 
      SIMPLE_PKC_TBS_ENV: 
    steps:
      - uses: actions/checkout@v6
      - name: Install SoftHSM2
        run: sudo apt-get update && sudo apt-get install -y softhsm2 opensc
      - name: Configure and initialize SoftHSM2
        run: |
          mkdir -p /tmp/softhsm/tokens
          cat > $SOFTHSM2_CONF << EOF
          directories.tokendir = /tmp/softhsm/tokens
          objectstore.backend = file
          EOF
          softhsm2-util --init-token --free --label paccor --pin $PKCS11_PIN --so-pin 0000
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Import test credentials into SoftHSM
        run: |
          # Decode embedded test credentials
          echo "$TEST_KEY_B64" | base64 -d > /tmp/test-key.pem
          echo "$TEST_CERT_B64" | base64 -d > /tmp/test-cert.pem

          # Find SoftHSM library (platform-agnostic)
          PKCS11_LIB=$(find /usr/lib* -name "libsofthsm2.so" 2>/dev/null | head -1)
          if [ -z "$PKCS11_LIB" ]; then
            echo "ERROR: SoftHSM library not found"
            exit 1
          fi
          echo "Using SoftHSM library: $PKCS11_LIB"
          echo "PKCS11_LIB=$PKCS11_LIB" >> $GITHUB_ENV

          # Get token slot
          SLOT=$(softhsm2-util --show-slots | awk '/^Slot / {slot=$2} /Label:.*paccor/ {print slot; exit}')

          # Import key and certificate with matching CKA_ID
          # SunPKCS11 requires both objects with same CKA_ID to enumerate entries
          softhsm2-util --import /tmp/test-key.pem --slot $SLOT --pin $PKCS11_PIN \
            --id aabbccdd --label "aabbccdd"

          openssl x509 -in /tmp/test-cert.pem -outform DER -out /tmp/test-cert.cer
          pkcs11-tool --module $PKCS11_LIB --token-label paccor --pin $PKCS11_PIN --login \
            --write-object /tmp/test-cert.cer --type cert --id aabbccdd --label "aabbccdd"
      - name: Build paccor
        run: |
          ./gradlew --no-daemon assemble distZip
      - name: Run PKCS#11 validation tests
        run: |
          ./gradlew --no-daemon test --tests "*AssembleCmdSigningPathsTest.testPkcs11Validation*"
      - name: Deploy Zip
        run: |
          ls build/distributions/paccor-*.zip
          mkdir -p paccor-dist
          unzip -d paccor-dist build/distributions/paccor-*.zip
          mv paccor-dist/paccor*/* paccor-dist/ &> /dev/null
          ls paccor-dist
      - name: Test PKCS#11 CKA_ID lookup with lowercase
        run: |
          # Create test envelope
          echo "$SIMPLE_PKC_TBS_ENV" | base64 -d > /tmp/envelope.json

          # Decode test certificate for issuer-cert parameter
          echo "$TEST_CERT_B64" | base64 -d > /tmp/test-cert.pem

          # Run paccor assemble with lowercase CKA_ID
          paccor-dist/bin/paccor assemble \
            --in /tmp/envelope.json \
            --out /tmp/signed-lowercase.cer \
            --issuer-cert /tmp/test-cert.pem \
            --pkcs11-module $PKCS11_LIB \
            --pkcs11-slot 0 \
            --pkcs11-key-id aabbccdd \
            --pkcs11-pin $PKCS11_PIN

          # Verify output file was created
          if [ ! -s /tmp/signed-lowercase.cer ]; then
            echo "ERROR: Output file not created or empty"
            exit 1
          fi
          echo "SUCCESS: Lowercase CKA_ID lookup succeeded"

      - name: Test PKCS#11 CKA_ID lookup with uppercase
        run: |
          # Reuse envelope and certificate from previous step
          echo "$TEST_CERT_B64" | base64 -d > /tmp/test-cert.pem

          # Run paccor assemble with uppercase CKA_ID
          paccor-dist/bin/paccor assemble \
            --in /tmp/envelope.json \
            --out /tmp/signed-uppercase.cer \
            --issuer-cert /tmp/test-cert.pem \
            --pkcs11-module $PKCS11_LIB \
            --pkcs11-slot 0 \
            --pkcs11-key-id AABBCCDD \
            --pkcs11-pin $PKCS11_PIN

          # Verify output file was created
          if [ ! -s /tmp/signed-uppercase.cer ]; then
            echo "ERROR: Output file not created or empty"
            exit 1
          fi
          echo "SUCCESS: Uppercase CKA_ID lookup succeeded"
      - name: Test PKCS#11 end to end paccor creation and validation
        run: |
          # Run paccor certgen
          paccor-dist/bin/paccor certgen \
            --serial 1 \
            --not-before 20240101 \
            --not-after 20300101 \
            --issuer-cert /tmp/test-cert.pem \
            --holder-cert src/test/resources/bare-bones-config/TCG_EK_ecc_p384_P-384_Test.pem \
            --attributes-json src/test/resources/bare-bones-config/base-bare-bones-policyreference.json \
            --components-json src/test/resources/bare-bones-config/base-bare-bones-componentlist.json \
            --extensions-json src/test/resources/tutorials/base-bare-bones-extentions-no-ti.json \
            --sig-profile rsa-sha256 \
            --finalize \
            --out /tmp/envelope-bb.json
          
          # Verify output file was created
          if [ ! -s /tmp/envelope-bb.json ]; then
            echo "ERROR: Output file not created or empty"
            exit 1
          fi
          
          # Run paccor assemble
          paccor-dist/bin/paccor assemble \
            --in /tmp/envelope-bb.json \
            --out /tmp/signed-bb.cer \
            --issuer-cert /tmp/test-cert.pem \
            --pkcs11-module $PKCS11_LIB \
            --pkcs11-slot 0 \
            --pkcs11-key-id AABBCCDD \
            --pkcs11-pin $PKCS11_PIN
          
          # Verify output file was created
          if [ ! -s /tmp/signed-bb.cer ]; then
            echo "ERROR: Output file not created or empty"
            exit 1
          fi
          
          # Run paccor validate
          paccor-dist/bin/paccor validate \
            --x509v2AttrCert /tmp/signed-bb.cer \
            --publicKeyCert /tmp/test-cert.pem \
            --components-json src/test/resources/bare-bones-config/base-bare-bones-componentlist.json
