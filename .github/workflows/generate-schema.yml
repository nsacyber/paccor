name: Docs

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  artifact-policy:
    runs-on: ubuntu-latest
    outputs:
      save_artifacts: ${{ steps.decide.outputs.save_artifacts }}
    steps:
      - name: Decide artifact upload
        id: decide
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
        run: |
          save_artifacts=false
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$REF_NAME" = "refs/heads/main" ] || [[ "$HEAD_COMMIT_MESSAGE" == *"[save artifacts]"* ]]; then
            save_artifacts=true
          fi
          echo "save_artifacts=$save_artifacts" >> "$GITHUB_OUTPUT"
  generate-docs:
    needs: artifact-policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Generate schemas, ASN.1 blocks, and project docs
        run: |
          ./gradlew generateDocs
          ls -al build/schema/*.json
          jq -e . build/schema/*.json
          find build/schema/fragments -name '*.json' -print -exec jq -e . {} \;
          test -s build/schema/docs/global-asn1-types.md
          test -s build/schema/asn1-blocks.json
          jq -e . build/schema/asn1-blocks.json > /dev/null
          find docs/reference/_generated -name '*.md' -print
          find docs/reference/_generated/graphs -name '*.mmd' -print

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install mkdocs
        run: |
          python -m pip install --upgrade pip
          pip install "mkdocs<2" "mkdocs-material<10" mkdocs-include-markdown-plugin

      - name: Build mkdocs site
        env:
          NO_MKDOCS_2_WARNING: "1"
        run: mkdocs build --strict

      - name: Upload schema artifacts
        if: needs.artifact-policy.outputs.save_artifacts == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: json-schema-artifacts
          path: |
            build/schema
            docs/reference/_generated

      - name: Upload mkdocs site
        if: needs.artifact-policy.outputs.save_artifacts == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: paccor-docs-site
          path: site

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: generate-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
