// Application packaging into a zip file
def createScript(Project project, String mainClassName, String name) {
    project.tasks.register(name, CreateStartScripts) { t ->
        t.outputDir       = project.layout.buildDirectory.dir("scripts").get().asFile
        t.mainClass       = mainClassName
        t.applicationName = name
        t.classpath       = project.tasks.named(JavaPlugin.JAR_TASK_NAME).get().outputs.files + project.configurations.runtimeClasspath
    }
    project.tasks.named(name).configure {
        dependsOn(project.tasks.named("jar"))
    }

    project.distributions.main.contents {
        into("bin") {
            from(project.tasks.named(name))
            filePermissions {
                unix(0755)
            }
            duplicatesStrategy = DuplicatesStrategy.EXCLUDE // IMPORTANT: eliminates duplicate files within the ZIP
        }
    }

    tasks.named("buildDeb") {
        dependsOn tasks.named(name)
    }
    tasks.named("buildRpm") {
        dependsOn tasks.named(name)
    }
}

// Suppress standard application plugin behavior in favor of easier to read program declarations below
startScripts.enabled = false
run.enabled = false

createScript(project, 'cli.RootCmd', 'paccor')

// Include files into a ZIP
distributions.main.contents {
    from("scripts/") {
        include "**/*.sh"
        into "scripts"
        filePermissions {
            unix(0755)
        }
    }
    from("scripts/") {
        exclude "**/*.sh"
        into "scripts"
    }
}
distributions.main.contents {
    // docs/ now hosts the mkdocs source tree; only ship static assets (PDF) in the binary distribution.
    from("docs/_assets/") {
        into "docs"
    }
}
distributions.main.contents {
    from("./") {
        include {
            details ->
            details.file.name.endsWith('.md')
        }
        into "./"
    }
}

def createCcrPathString(String ccr, String config, String runtime) {
    def prefix = "${project.rootDir}${File.separator}dotnet${File.separator}ComponentClassRegistry"
    def netVersion = "net10.0"
    return "${prefix}${File.separator}${ccr}${File.separator}bin${File.separator}${config}${File.separator}${netVersion}${File.separator}${runtime}${File.separator}publish${File.separator}${ccr}"
}

def static getDotnetConfig() {
    return "Release"
}

def static getDotnetRuntimeLinux() {
    return "linux-x64"
}

def static getDotnetRuntimeWin() {
    return "win-x64"
}

def getZipOutputPath() {
    return layout.buildDirectory.dir("distributions")
}

def getStagingPathForUtilities() {
    return layout.buildDirectory.dir("tmp${File.separator}staging")
}

def createLinuxZipFileList() {
    def config = getDotnetConfig()
    def runtime = getDotnetRuntimeLinux()
    def smbios = file(createCcrPathString("SmbiosCli", config, runtime))
    def pcie = file(createCcrPathString("PcieCli", config, runtime))
    def storage = file(createCcrPathString("StorageCli", config, runtime))

    return [smbios, pcie, storage]
}

def createWinZipFileList() {
    def config = getDotnetConfig()
    def runtime = getDotnetRuntimeWin()
    def smbios = file(createCcrPathString("SmbiosCli", config, runtime) + ".exe")
    def pcie = file(createCcrPathString("PcieCli", config, runtime) + ".exe")
    def storage = file(createCcrPathString("StorageCli", config, runtime) + ".exe")

    return [smbios, pcie, storage]
}

def static checkFilesExist(ArrayList<File> fileList, String destinationIfExists) {
    fileList.each { file ->
        if (file.exists()) {
            println "Copied ${file.name} into ${destinationIfExists}."
        } else {
            println "${file.name} not found. If it was expected, build dotnet before gradle."
        }
    }
}

// Create Windows ZIP
tasks.register("distZipWin", Zip) {
    def archiveBaseName = project.name
    def rootDirInZip = "${archiveBaseName}-${version}"
    def destinationInZip = "${rootDirInZip}${File.separator}scripts"
    def zipOutputDestination = getZipOutputPath()
    def runtime = getDotnetRuntimeWin()
    def archiveName = "${archiveBaseName}.${version}.${runtime}.zip"

    def fileList = createWinZipFileList()

    into(rootDirInZip) {
        with distributions.main.contents
    }

    from(fileList.findAll { it.exists() }) {
        into "${destinationInZip}"
    }

    archiveFileName.set(archiveName)
    destinationDirectory.set(zipOutputDestination)

    doFirst {
        checkFilesExist(fileList, archiveName)
    }
}

// Create Linux ZIP
tasks.register("distZipLinux", Zip) {
    def archiveBaseName = project.name
    def rootDirInZip = "${archiveBaseName}-${version}"
    def destinationInZip = "${rootDirInZip}${File.separator}scripts"
    def zipOutputDestination = getZipOutputPath()
    def runtime = getDotnetRuntimeLinux()
    def archiveName = "${archiveBaseName}.${version}.${runtime}.zip"

    def fileList = createLinuxZipFileList()

    into(rootDirInZip) {
        with distributions.main.contents
    }

    from(fileList.findAll { it.exists() }) {
        into destinationInZip
        filePermissions {
            unix(0755)
        }
    }

    archiveFileName.set(archiveName)
    destinationDirectory.set(zipOutputDestination)

    doFirst {
        checkFilesExist(fileList, archiveName)
    }
}

// Copies linux registry utilities into a packaging staging folder, if they exist
tasks.register("stageUtilsForDebRpm", Copy) {
    def stagingFolder = file(getStagingPathForUtilities())
    def fileList = createLinuxZipFileList()

    from fileList.findAll { it.exists() }
    into "${stagingFolder}"

    doFirst {
        checkFilesExist(fileList, "${stagingFolder}")
    }
}

tasks.named("buildDeb") {
    dependsOn tasks.named("stageUtilsForDebRpm")
}

tasks.named("buildRpm") {
    dependsOn tasks.named("stageUtilsForDebRpm")
}

// Produce packages
ospackage {
    packageName='paccor'
    os=LINUX
    version="${project.version}"
    release=null

    into '/opt/paccor'
    user 'root'

    fileMode 0644
    dirMode 0755

    requires('dmidecode', '3.2', (int)(GREATER | EQUAL))
    requires('ethtool')
    requires('java-25-openjdk-devel')
    requires('jq')
    requires('lshw')
    requires('nvme-cli')
    requires('vim-common')

    from(jar.outputs.files) {
        into 'lib'
    }

    from('lib') {
        into 'lib'
    }

    from(configurations.runtimeClasspath) {
        into 'lib'
    }

    from('build/scripts') {
        exclude {
            FileTreeElement details ->
            details.file.name.endsWith('.bat')
        }
        into 'bin'
        filePermissions {
            unix(0755)
        }
    }

    from("scripts/") {
        include "**/*.sh"
        into "scripts"
        filePermissions {
            unix(0755)
        }
    }
    from("scripts/") {
        exclude "**/*.sh"
        into "scripts"
    }

    from('docs/_assets') {
        exclude {
            FileTreeElement details ->
            details.file.name.endsWith('.odt')
        }
        into 'docs'
    }

    from('./') {
        include {
            FileTreeElement details ->
            details.file.name.endsWith('.md')
        }
        into './'
    }

    from (getStagingPathForUtilities()) {
        into 'scripts'
    }
}
