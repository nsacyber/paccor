plugins {
    id 'application'
    id 'com.netflix.nebula.ospackage' version '12.2.0'
    id 'java-library'
    id 'maven-publish'
    id 'signing'
}

// version number
def major_minor_version = '2.0'
def revision = '2'
def release_version = "${major_minor_version}r${revision}"

version = release_version

java {
    withJavadocJar()
    withSourcesJar()
}

allprojects {
    repositories {
        mavenCentral()
    }
}

def firstNonBlankProperty(String... names) {
    for (String name : names) {
        if (hasProperty(name)) {
            def value = property(name)?.toString()?.trim()
            if (value) {
                return value
            }
        }
    }
    return null
}

def bridgeLegacySigningProperty(String standardName, String legacyName) {
    if (!hasProperty(standardName)) {
        def legacyValue = firstNonBlankProperty(legacyName)
        if (legacyValue != null) {
            ext.set(standardName, legacyValue)
        }
    }
}

bridgeLegacySigningProperty('signing.keyId', 'crypto.keyId')
bridgeLegacySigningProperty('signing.password', 'crypto.password')
bridgeLegacySigningProperty('signing.secretKeyRingFile', 'crypto.secretKeyRingFile')

