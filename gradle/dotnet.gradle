def dotnetConfig = "Release"
def dotnetRuntimeLinux = "linux-x64"
def dotnetRuntimeWin = "win-x64"

def static dotnetProject(String tool) {
    "dotnet/ComponentClassRegistry/${tool}/${tool}.csproj"
}

def dotnetOutput(String tool, String runtime) {
    def base = "${rootDir}/dotnet/ComponentClassRegistry/${tool}/bin/${dotnetConfig}/${runtime}/publish/${tool}"
    return runtime.contains("win") ? file(base + ".exe") : file(base)
}

// dotnetPublish{Linux|Win}
tools.each { tool ->
    tasks.register("dotnetPublishLinux${tool}", Exec) {
        commandLine "dotnet", "publish",
                dotnetProject(tool),
                "-c", dotnetConfig,
                "-r", dotnetRuntimeLinux
    }

    tasks.register("dotnetPublishWin${tool}", Exec) {
        commandLine "dotnet", "publish",
                dotnetProject(tool),
                "-c", dotnetConfig,
                "-r", dotnetRuntimeWin
    }
}

// dotnetPublish
tasks.register("dotnetPublish") {
    group = "build"

    dependsOn tools.collect { tool ->
        [
                "dotnetPublishLinux${tool}",
                "dotnetPublishWin${tool}"
        ]
    }.flatten()
}

// stageDotnet
tasks.register("stageDotnet") {
    dependsOn "dotnetPublish"

    doLast {
        def outDir = file("$buildDir/staged/dotnet")
        delete outDir
        outDir.mkdirs()

        tools.each { tool ->

            def linux = file("${rootDir}/dotnet/ComponentClassRegistry/${tool}/bin/Release/linux-x64/publish/${tool}")
            def win   = file("${rootDir}/dotnet/ComponentClassRegistry/${tool}/bin/Release/win-x64/publish/${tool}.exe")

            if (linux.exists()) {
                copy { from linux; into outDir }
            }

            if (win.exists()) {
                copy { from win; into outDir }
            }
        }
    }
}
