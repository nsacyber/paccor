evaluationDependsOn(":doc-tools")

def docToolsProject = project(":doc-tools")
def docClasspath = docToolsProject.sourceSets.main.runtimeClasspath

tasks.register("extractAsn1Blocks", JavaExec) {
    group = "docs"

    dependsOn docToolsProject.tasks.named("classes")

    mainClass = "paccor.docgen.AsnDoclet"
    classpath = files(docClasspath, sourceSets.main.runtimeClasspath)

    def out = layout.buildDirectory.file("schema/asn1-blocks.json").get().asFile

    inputs.files(sourceSets.main.allJava)
    outputs.file(out)

    args "--asn1-output", out.absolutePath,
            "--source-root", "${projectDir}/src/main/java",
            "--package-filter", "paccor.tcg.credential"
}

tasks.register("generateDocs") {
    group = "docs"

    dependsOn "extractAsn1Blocks"

    def schemaDir = layout.buildDirectory.dir("schema")
    def staged = layout.projectDirectory.dir("docs/reference/_generated")

    inputs.dir(schemaDir)
    outputs.dir(staged)

    doLast {
        delete staged
        copy {
            from(schemaDir.get().dir("docs"))
            into staged
        }
        copy {
            from(schemaDir.get().dir("graphs"))
            into staged.dir("graphs")
        }
        copy {
            from(schemaDir.get().dir("schema-json"))
            into staged.dir("schema-json")
        }
    }
}
