tasks.named("buildDeb") {
    dependsOn "installToSource"
}

tasks.named("buildRpm") {
    dependsOn "installToSource"
}

ospackage {
    packageName = "paccor"
    os = LINUX
    version = project.version

    buildRpm { arch = "X86_64" }
    buildDeb { arch = "amd64" }

    into "/opt/paccor"
    user "root"

    fileMode 0644
    dirMode 0755

    requires('dmidecode', '3.2', (int)(GREATER | EQUAL))
    requires('ethtool')
    requires('java-25-openjdk-devel')
    requires('jq')
    requires('lshw')
    requires('nvme-cli')
    requires('vim-common')

    applyPackageLayout(delegate, packageContent("linux"), "linux")
}
